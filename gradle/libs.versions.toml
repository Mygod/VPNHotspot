zxing-core = "com.google.zxing:core:3.5.4"

[plugins]
android-application = "com.android.application:9.2.1"
ben-manes-versions = "com.github.ben-manes.versions:0.54.0"
compose-compiler = "org.jetbrains.kotlin.plugin.compose:2.4.0"
crashlytics = "com.google.firebase.crashlytics:3.0.7"
google-services = "com.google.gms.google-services:4.5.0"
kotlin-parcelize = "org.jetbrains.kotlin.plugin.parcelize:2.4.0"
ksp = "com.google.devtools.ksp:2.3.9"
wire = { id = "com.squareup.wire", version.ref = "wire" }
