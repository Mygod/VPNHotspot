[versions]
lifecycle = "2.11.0"
room = "2.8.4"
wire = "6.4.5"

[libraries]
activity-compose = "androidx.activity:activity-compose:1.13.0"
annotation-jvm = "androidx.annotation:annotation-jvm:1.10.0"
browser = "androidx.browser:browser:1.10.0"
compose-bom = "androidx.compose:compose-bom-alpha:2026.06.00"
core = "androidx.core:core:1.19.0"
espresso-core = "androidx.test.espresso:espresso-core:3.7.0"
firebase-analytics = "com.google.firebase:firebase-analytics:23.2.0"
firebase-crashlytics = "com.google.firebase:firebase-crashlytics:20.0.6"
hiddenapibypass = "org.lsposed.hiddenapibypass:hiddenapibypass:6.1"
junit = "junit:junit:4.13.2"
junit-ktx = "androidx.test.ext:junit-ktx:1.3.0"
kotlinx-collections-immutable = "org.jetbrains.kotlinx:kotlinx-collections-immutable:0.5.0"
kotlinx-coroutines-android = "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.11.0"
ktor-io-jvm = "io.ktor:ktor-io-jvm:3.5.1"
