[versions]
kotlin = "2.3.21"
lifecycle = "2.10.0"
room = "2.8.4"

[libraries]
browser = "androidx.browser:browser:1.10.0"
core-i18n = "androidx.core:core-i18n:1.0.0"
core-ktx = "androidx.core:core-ktx:1.18.0"
desugar-jdk-libs = "com.android.tools:desugar_jdk_libs:2.1.5"
dexmaker = "com.linkedin.dexmaker:dexmaker:2.28.6"
espresso-core = "androidx.test.espresso:espresso-core:3.7.0"
firebase-analytics = "com.google.firebase:firebase-analytics:23.2.0"
firebase-crashlytics = "com.google.firebase:firebase-crashlytics:20.0.5"
fragment-ktx = "androidx.fragment:fragment-ktx:1.8.9"
hiddenapibypass = "org.lsposed.hiddenapibypass:hiddenapibypass:6.1"
junit = "junit:junit:4.13.2"
junit-ktx = "androidx.test.ext:junit-ktx:1.3.0"
kotlinx-collections-immutable = "org.jetbrains.kotlinx:kotlinx-collections-immutable:0.4.0"
kotlinx-coroutines-android = "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2"
ktor-io-jvm = "io.ktor:ktor-io-jvm:3.4.3"
librootkotlinx = "be.mygod.librootkotlinx:librootkotlinx:2.0.0-alpha02"
lifecycle-livedata-ktx = { module = "androidx.lifecycle:lifecycle-livedata-ktx", version.ref = "lifecycle" }
lifecycle-runtime-ktx = { module = "androidx.lifecycle:lifecycle-runtime-ktx", version.ref = "lifecycle" }
material = "com.google.android.material:material:1.13.0"
play-services-oss-licenses = "com.google.android.gms:play-services-oss-licenses:17.5.1"
preference = "androidx.preference:preference:1.2.1"
preferencex-simplemenu = "com.takisoft.preferencex:preferencex-simplemenu:1.1.0"
room-compiler = { module = "androidx.room:room-compiler", version.ref = "room" }
room-ktx = { module = "androidx.room:room-ktx", version.ref = "room" }
room-testing = { module = "androidx.room:room-testing", version.ref = "room" }
swiperefreshlayout = "androidx.swiperefreshlayout:swiperefreshlayout:1.2.0"
test-runner = "androidx.test:runner:1.7.0"
timber = "com.jakewharton.timber:timber:5.0.1"
zxing-core = "com.google.zxing:core:3.5.4"

[plugins]
android-application = "com.android.application:9.2.0"
ben-manes-versions = "com.github.ben-manes.versions:0.54.0"
crashlytics = "com.google.firebase.crashlytics:3.0.7"
google-services = "com.google.gms.google-services:4.4.4"
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
ksp = "com.google.devtools.ksp:2.3.7"
